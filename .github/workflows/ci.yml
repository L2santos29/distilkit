# =============================================================================
# DistilKit — CI Pipeline
#
# Runs on every push to any branch and on pull requests to main.
# - Installs CPU-only PyTorch for fast dependency resolution
# - Caches pip downloads to speed up subsequent runs
# - Runs the full test suite with coverage
# - Audits dependencies for known vulnerabilities
# - Reports results in a concise, human-readable format
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_NO_CACHE_DIR: "0"
  DEVICE: "cpu"

jobs:
  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopenblas-dev \
            libomp-dev
          sudo apt-get clean

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch first (no CUDA needed)
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install onnx onnxruntime numpy tqdm matplotlib fastapi uvicorn sse-starlette
          pip install pytest pytest-cov

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/ --no-cache
        continue-on-error: true
        timeout-minutes: 2

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=src --cov-report=term --cov-report=term-missing 2>&1

      - name: Verify CLI starts
        run: |
          python -m src.cli --help
          python -m src.cli train --help
          python -m src.cli gui --help
          python -m src.cli api --help

      - name: Audit dependencies for vulnerabilities
        run: |
          pip install pip-audit
          pip-audit --strict --desc on 2>&1
        continue-on-error: true
        timeout-minutes: 5
