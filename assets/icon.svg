<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Neural network nodes -->
  <circle cx="140" cy="180" r="18" fill="#a5b4fc" opacity="0.8"/>
  <circle cx="256" cy="140" r="18" fill="#a5b4fc" opacity="0.8"/>
  <circle cx="372" cy="180" r="18" fill="#a5b4fc" opacity="0.8"/>
  <circle cx="140" cy="332" r="18" fill="#a5b4fc" opacity="0.8"/>
  <circle cx="256" cy="372" r="18" fill="#a5b4fc" opacity="0.8"/>
  <circle cx="372" cy="332" r="18" fill="#a5b4fc" opacity="0.8"/>

  <!-- Connections (neural network lines) -->
  <line x1="140" y1="180" x2="256" y2="140" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="140" x2="372" y2="180" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>
  <line x1="140" y1="180" x2="140" y2="332" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="140" x2="256" y2="372" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>
  <line x1="372" y1="180" x2="372" y2="332" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>
  <line x1="140" y1="332" x2="256" y2="372" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="372" x2="372" y2="332" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>
  <line x1="140" y1="180" x2="256" y2="372" stroke="#c7d2fe" stroke-width="2" opacity="0.3"/>
  <line x1="372" y1="180" x2="256" y2="372" stroke="#c7d2fe" stroke-width="2" opacity="0.3"/>
  <line x1="140" y1="332" x2="256" y2="140" stroke="#c7d2fe" stroke-width="2" opacity="0.3"/>
  <line x1="372" y1="332" x2="256" y2="140" stroke="#c7d2fe" stroke-width="2" opacity="0.3"/>

  <!-- Lightning bolt (distillation symbol) -->
  <polygon points="280,120 180,260 240,260 220,380 340,230 280,230 300,120"
           fill="url(#bolt)" stroke="#d97706" stroke-width="2" stroke-linejoin="round"/>

  <!-- Small sparkles -->
  <circle cx="160" cy="130" r="4" fill="#fde68a" opacity="0.8"/>
  <circle cx="360" cy="380" r="4" fill="#fde68a" opacity="0.8"/>
  <circle cx="380" cy="130" r="3" fill="#fde68a" opacity="0.6"/>
  <circle cx="130" cy="380" r="3" fill="#fde68a" opacity="0.6"/>
</svg>
