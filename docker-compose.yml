# DistilKit — Development Environment
#
# Build & start the web GUI:
#   docker compose up
#
# Run a CLI command:
#   docker compose run --rm distilkit distilkit train --epochs 5
#
# Rebuild after dependency changes (requirements.txt):
#   docker compose build
# ============================================================================

services:
  distilkit:
    build:
      context: .
      dockerfile: Dockerfile
    image: distilkit:dev
    container_name: distilkit
    ports:
      - "${PORT:-7860}:7860"
    environment:
      - DEVICE=${DEVICE:-cpu}
      - HOST=0.0.0.0
      - PORT=7860
      - API_ONLY=${API_ONLY:-false}
      - RUNS_DIR=/app/runs
      - DATA_DIR=/app/data
      - CHECKPOINTS_DIR=/app/checkpoints
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Mount source code for live development (no rebuild needed on src/ changes)
      - ./src:/app/src
      # Persist datasets across restarts
      - distilkit_data:/app/data
      # Persist checkpoints and exports across restarts
      - distilkit_ckpt:/app/checkpoints
      # Persist run history across restarts
      - distilkit_runs:/app/runs
    # Hot-reload: uvicorn watches src/ for changes
    command: uvicorn src.webapp:app --host 0.0.0.0 --port 7860 --reload
    restart: unless-stopped

volumes:
  distilkit_data:
  distilkit_ckpt:
  distilkit_runs:
