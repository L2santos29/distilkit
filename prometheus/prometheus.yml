# DistilKit — Prometheus Scrape Configuration
#
# Scrapes the /metrics endpoint exposed by DistilKit and loads the
# alerting rules defined in alert_rules.yml.
#
# Usage with docker compose:
#
#   services:
#     prometheus:
#       image: prom/prometheus:latest
#       ports:
#         - "9090:9090"
#       volumes:
#         - ./prometheus:/etc/prometheus:ro
#       command:
#         - "--config.file=/etc/prometheus/prometheus.yml"
#         - "--storage.tsdb.path=/prometheus"
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # If Alertmanager is running, add its address here:
            # - "alertmanager:9093"

scrape_configs:
  - job_name: distilkit
    static_configs:
      - targets:
          # Change to the actual DistilKit host:port in your environment.
          - "host.docker.internal:7860"
          # Linux (non-Docker Desktop):
          # - "localhost:7860"
          # Docker Compose (same network):
          # - "distilkit:7860"
    metrics_path: /metrics
    scheme: http
    # Uncomment for HTTPS:
    # scheme: https
    # tls_config:
    #   insecure_skip_verify: true
    # Uncomment for authenticated endpoints:
    # authorization:
    #   type: ApiKey
    #   credentials: "${PROMETHEUS_API_KEY}"
